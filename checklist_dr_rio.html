<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist del material de cirugía vascular del equipo Dr. Río</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Lora:wght@400;500;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
:root{
  --rosa:#FFB5C5;--rosa-d:#E05252;--rosa-dd:#C73E5C;--rosa-l:#FFF0F3;
  --mint:#7ECDB5;--mint-d:#4AA88A;--mint-l:#E8F8F0;--mint-dd:#2D8A6D;
  --lav:#C4A8F0;--lav-d:#9064D6;--lav-l:#F0EAF8;
  --sky:#8ECBE8;--sky-l:#E6F4FC;
  --yellow:#FFD966;--yellow-l:#FFF8DB;
  --coral:#FF9E9E;
  --card:#fff;--bg:#FFF5F7;--text:#3D3D4E;--text-l:#8E8E9E;--text-ll:#B5B5C5;
  --shadow:0 2px 12px rgba(0,0,0,0.05);--shadow-h:0 6px 24px rgba(0,0,0,0.08);
  --radius:18px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;position:relative;overflow-x:hidden}
body::before{content:'';position:fixed;top:-80px;right:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(255,181,197,0.12),transparent 70%);border-radius:50%;z-index:0;pointer-events:none}
body::after{content:'';position:fixed;bottom:-60px;left:-60px;width:280px;height:280px;background:radial-gradient(circle,rgba(126,205,181,0.1),transparent 70%);border-radius:50%;z-index:0;pointer-events:none}
.doodle-layer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.doodle{position:absolute;animation:floatD 20s ease-in-out infinite}
.doodle:nth-child(odd){animation-direction:reverse}
.doodle:nth-child(3n){animation-duration:25s}
.doodle:nth-child(5n){animation-duration:30s}
@keyframes floatD{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-12px) rotate(4deg)}50%{transform:translateY(6px) rotate(-3deg)}75%{transform:translateY(-6px) rotate(2deg)}}
.page{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:16px 14px 60px}
.hero{text-align:center;padding:20px 16px 10px}
.hero-badge{display:none}
.hero h1{font-family:'Lora',serif;font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--rosa-dd),var(--lav-d),var(--mint-dd));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;margin-bottom:0}
.hero .sub{font-family:'Montserrat',sans-serif;font-size:1.1rem;color:var(--text-l);margin:4px 0 8px;font-weight:700;text-transform:uppercase;letter-spacing:3px}
.eva-illo img{background:transparent;filter:drop-shadow(0 6px 16px rgba(0,0,0,0.08));animation:evaWalk 2s ease-in-out infinite;width:200px;height:auto}
.eva-illo{display:flex;justify-content:center;margin:6px 0 4px;background:transparent}
.eva-illo svg{display:none}
@keyframes evaWalk{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-6px) rotate(1deg)}}
.rainbow-line{width:220px;height:5px;border-radius:5px;margin:10px auto;background:linear-gradient(90deg,var(--rosa),var(--yellow),var(--mint),var(--sky),var(--lav),var(--rosa))}
.tip-bubble{display:inline-flex;align-items:center;gap:8px;background:var(--yellow-l);border:2.5px solid var(--yellow);border-radius:18px;padding:10px 20px;font-family:'Lora',serif;font-size:1rem;color:var(--text);margin-top:8px;box-shadow:0 2px 8px rgba(212,168,40,0.08)}
@keyframes wiggle{0%,100%{transform:rotate(-0.5deg)}50%{transform:rotate(0.5deg)}}
.tabs-wrap{position:sticky;top:0;z-index:100;background:rgba(255,245,247,0.95);backdrop-filter:blur(8px);padding:10px 0;border-bottom:2px solid var(--rosa-l)}
.tabs{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:880px;margin:0 auto;padding:0 10px}
.tab{font-family:'Montserrat',sans-serif;font-size:.85rem;font-weight:700;padding:10px 20px;border:none;border-radius:30px;cursor:pointer;background:var(--card);color:var(--text);box-shadow:var(--shadow);transition:all .25s;white-space:nowrap;letter-spacing:.5px}
.tab.c0{background:#FFF0F0}.tab.c1{background:#FDF0FA}.tab.c2{background:#EDFAF5}.tab.c3{background:#E6F4FC}.tab.c4{background:#F0EAF8}.tab.c5{background:#FFF8DB}.tab.c6{background:#FFF2EB}.tab.c7{background:#EBF2FC}.tab.c8{background:#F2EDFA}
.tab:hover{transform:translateY(-2px);box-shadow:var(--shadow-h);filter:brightness(0.95)}
.tab.active{color:#fff;box-shadow:0 4px 16px rgba(0,0,0,0.12);filter:none}
.tab.c0.active{background:linear-gradient(135deg,#E05252,#FF7E7E)}
.tab.c1.active{background:linear-gradient(135deg,#D47BC4,#F0A0D8)}
.tab.c2.active{background:linear-gradient(135deg,#4AA88A,#7ECDB5)}
.tab.c3.active{background:linear-gradient(135deg,#3A9EC7,#6EC6E8)}
.tab.c4.active{background:linear-gradient(135deg,#9064D6,#C4A8F0)}
.tab.c5.active{background:linear-gradient(135deg,#D4A828,#FFD966)}
.tab.c6.active{background:linear-gradient(135deg,#E08050,#FFB088)}
.tab.c7.active{background:linear-gradient(135deg,#5B8DD9,#8EBBF0)}
.tab.c8.active{background:linear-gradient(135deg,#8E6BBF,#BEA0E8)}
.panel{display:none;animation:fadeIn .3s ease}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.panel-head{text-align:center;padding:22px;border-radius:var(--radius) var(--radius) 0 0;position:relative;overflow:hidden}
.panel-head .dots{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.12) 1.5px,transparent 1.5px);background-size:14px 14px;z-index:0}
.panel-head h2{font-family:'Lora',serif;font-size:1.8rem;font-weight:700;color:#fff;position:relative;z-index:1}
.panel-head.c0{background:linear-gradient(135deg,#E05252,#FF7E7E)}
.panel-head.c1{background:linear-gradient(135deg,#D47BC4,#F0A0D8)}
.panel-head.c2{background:linear-gradient(135deg,#4AA88A,#7ECDB5)}
.panel-head.c3{background:linear-gradient(135deg,#3A9EC7,#6EC6E8)}
.panel-head.c4{background:linear-gradient(135deg,#9064D6,#C4A8F0)}
.panel-head.c5{background:linear-gradient(135deg,#D4A828,#FFD966)}
.panel-head.c6{background:linear-gradient(135deg,#E08050,#FFB088)}
.panel-head.c7{background:linear-gradient(135deg,#5B8DD9,#8EBBF0)}
.panel-head.c8{background:linear-gradient(135deg,#8E6BBF,#BEA0E8)}
.prog-wrap{background:var(--card);border-radius:0 0 var(--radius) var(--radius);padding:14px 22px;margin-bottom:14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.prog-bar{flex:1;height:16px;background:#f5f0f2;border-radius:16px;overflow:hidden;min-width:120px}
.prog-fill{height:100%;border-radius:16px;transition:width .4s ease;width:0%;position:relative}
.prog-fill::after{content:'';position:absolute;top:3px;left:5px;right:5px;height:5px;background:rgba(255,255,255,0.35);border-radius:5px}
.prog-pct{font-family:'Lora',serif;font-weight:700;font-size:1.1rem;min-width:48px;text-align:right}
.prog-msg{font-family:'Patrick Hand',cursive;font-size:.88rem;color:var(--text-l);min-width:80px}
.cat{background:var(--card);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .3s,transform .2s}
.cat:hover{box-shadow:var(--shadow-h);transform:translateY(-1px)}
.cat-head{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;user-select:none;transition:background .2s;border-left:5px solid transparent}
.cat-head:hover{background:rgba(255,181,194,0.04)}
.cat-head.instrumental{border-left-color:var(--rosa);background:rgba(255,181,197,0.06)}
.cat-head.fungible{border-left-color:var(--mint);background:rgba(126,205,181,0.06)}
.cat-head.medicacion{border-left-color:var(--yellow);background:rgba(255,217,102,0.08)}
.cat-head.suturas{border-left-color:var(--sky);background:rgba(142,203,232,0.06)}
.cat-head.extra{border-left-color:var(--lav);background:rgba(196,168,240,0.06)}
.cat-ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.35rem;flex-shrink:0;position:relative}
.cat-ico.instrumental{background:var(--rosa-l)}
.cat-ico.fungible{background:var(--mint-l)}
.cat-ico.medicacion{background:var(--yellow-l)}
.cat-ico.suturas{background:var(--sky-l)}
.cat-ico.extra{background:var(--lav-l)}
.cat-ico::after{content:'';position:absolute;top:-2px;right:-2px;width:11px;height:11px;background:var(--yellow);border-radius:50%;opacity:0;transition:opacity .3s;border:2px solid var(--card)}
.cat-head:hover .cat-ico::after{opacity:1}
.cat-name{font-family:'Lora',serif;font-weight:700;font-size:.95rem;letter-spacing:.4px;flex:1}
.cat-cnt{font-family:'Montserrat',sans-serif;font-size:.85rem;font-weight:700;padding:2px 12px;border-radius:20px;background:#f5f3f8;color:var(--text-l);transition:all .3s}
.cat-cnt.done{background:var(--mint-l);color:var(--mint-d)}
.cat-arrow{font-size:.65rem;color:var(--text-ll);transition:transform .3s}
.cat-head.shut .cat-arrow{transform:rotate(-90deg)}
.cat-body{padding:2px 18px 14px;transition:max-height .35s ease,opacity .25s ease}
.cat-body.shut{max-height:0!important;padding-top:0;padding-bottom:0;opacity:0;overflow:hidden}
.ci{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1.5px dashed #eeedf3;transition:all .25s}
.ci:last-child{border-bottom:none}
.ci input{display:none}
.ci .bx{width:28px;height:28px;border-radius:9px;border:2.5px solid #d8d6e0;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s;position:relative}
.ci input:checked+.bx{border-color:var(--mint-d);background:var(--mint);animation:pop .35s ease}
.ci input:checked+.bx::after{content:'✓';color:#fff;font-size:.9rem;font-weight:900}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.3) rotate(10deg)}100%{transform:scale(1)}}
.ci input:checked~.lb{text-decoration:line-through;color:var(--text-ll);opacity:.5}
.ci .lb{font-size:.9rem;cursor:pointer;flex:1;line-height:1.35;font-weight:500}
.actions{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.btn{font-family:'Montserrat',sans-serif;font-size:.8rem;font-weight:700;padding:10px 22px;border:none;border-radius:30px;cursor:pointer;transition:all .25s;text-transform:uppercase;letter-spacing:1px}
.btn-reset{background:var(--yellow-l);color:var(--text);border:2px solid var(--yellow)}
.btn-reset:hover{background:var(--yellow);transform:translateY(-2px)}
.btn-print{background:var(--mint-l);color:var(--mint-dd);border:2px solid var(--mint)}
.btn-print:hover{background:var(--mint);color:#fff;transform:translateY(-2px)}
.cele{position:fixed;inset:0;pointer-events:none;z-index:999}
.confetti{position:absolute;border-radius:3px;animation:cfall 2.8s ease-in forwards}
@keyframes cfall{0%{transform:translateY(-30px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(900deg);opacity:0}}
.complete-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:var(--card);border-radius:28px;padding:32px 44px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.15);z-index:1000;animation:popIn .5s .3s ease forwards;pointer-events:none}
@keyframes popIn{0%{transform:translate(-50%,-50%) scale(0)}60%{transform:translate(-50%,-50%) scale(1.1)}100%{transform:translate(-50%,-50%) scale(1)}}
.complete-msg .big{font-size:3rem;margin-bottom:8px}
.complete-msg .txt{font-family:'Lora',serif;font-size:1.5rem;font-weight:700;color:var(--mint-d)}
.complete-msg .sub2{font-family:'Patrick Hand',cursive;font-size:1rem;color:var(--text-l);margin-top:4px}
.foot{text-align:center;padding:20px;font-family:'Patrick Hand',cursive;font-size:.95rem;color:var(--text-l)}
@media print{
  @page{size:A4 landscape;margin:6mm}
  body{background:#fff!important;font-size:6pt}
  body::before,body::after,.tabs-wrap,.actions,.foot,.tip-bubble,.rainbow-line,.eva-illo,.doodle-layer,.prog-wrap,.cele,.complete-msg,.hero{display:none!important}
  .page{max-width:100%;padding:0;display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
  .panel{display:block!important;break-inside:avoid;margin:0}
  .panel-head{padding:3px 6px;border-radius:4px 4px 0 0;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .panel-head .dots{display:none}
  .panel-head h2{font-size:.6rem;margin:0}
  .cat{box-shadow:none;border:0.5px solid #ccc;border-radius:4px;margin-bottom:2px}
  .cat-head{padding:2px 4px;gap:2px;border-left-width:3px}
  .cat-ico{width:12px;height:12px;font-size:.5rem;border-radius:2px}
  .cat-name{font-size:.5rem;letter-spacing:0}
  .cat-cnt,.cat-arrow,.cat-ico::after{display:none}
  .cat-body,.cat-body.shut{max-height:none!important;opacity:1!important;padding:1px 4px 2px;columns:2;column-gap:6px}
  .ci{padding:1px 0;gap:2px;break-inside:avoid;border-bottom:none}
  .ci .bx{width:8px;height:8px;border-radius:2px;border-width:1px}
  .ci .lb{font-size:.45rem;line-height:1.15}
}
@media(max-width:600px){.hero h1{font-size:1.8rem}.tabs{gap:4px}.tab{font-size:.62rem;padding:5px 10px}.panel-head h2{font-size:1.2rem}.cat-head{padding:10px 14px}}
</style>
</head>

let curId=P[0].id;
const tabsEl=document.getElementById('tabs'),panelsEl=document.getElementById('panels');
P.forEach((p,pi)=>{
  const btn=document.createElement('button');btn.className='tab c'+p.ci+(pi===0?' active':'');btn.textContent=p.short;btn.onclick=()=>switchTo(p.id);tabsEl.appendChild(btn);
  let h=`<div class="panel${pi===0?' active':''}" id="p-${p.id}"><div class="panel-head c${p.ci}"><div class="dots"></div><h2>${p.name}</h2></div><div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" id="pf-${p.id}" style="background:linear-gradient(90deg,var(--rosa),var(--mint))"></div></div><span class="prog-pct" id="pp-${p.id}">0%</span><span class="prog-msg" id="pm-${p.id}">Vamos allá...</span></div>`;
  p.secs.forEach((s,si)=>{
    h+=`<div class="cat"><div class="cat-head ${s.t}" onclick="togCat(this)"><div class="cat-ico ${s.t}">${s.ico}</div><span class="cat-name">${s.n}</span><span class="cat-cnt" id="cc-${p.id}-${si}">0/${s.items.length}</span><span class="cat-arrow">▼</span></div><div class="cat-body" id="cb-${p.id}-${si}">`;
    s.items.forEach((item,ii)=>{const uid=`${p.id}-${si}-${ii}`;h+=`<div class="ci"><input type="checkbox" id="x-${uid}" onchange="onChk('${p.id}',${si})"><div class="bx" onclick="document.getElementById('x-${uid}').click()"></div><label class="lb" for="x-${uid}">${item}</label></div>`});
    h+=`</div></div>`;
  });
  h+=`</div>`;panelsEl.innerHTML+=h;
});
function switchTo(id){curId=id;document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',P[i].id===id));document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='p-'+id));document.querySelectorAll('.panel.active .cat-body:not(.shut)').forEach(b=>b.style.maxHeight=b.scrollHeight+'px')}
function togCat(el){el.classList.toggle('shut');const body=el.nextElementSibling;if(el.classList.contains('shut'))body.classList.add('shut');else{body.classList.remove('shut');body.style.maxHeight=body.scrollHeight+'px'}}
function onChk(pid,si){const sec=P.find(p=>p.id===pid).secs[si];const body=document.getElementById(`cb-${pid}-${si}`);const checked=body.querySelectorAll('input:checked').length;const cnt=document.getElementById(`cc-${pid}-${si}`);cnt.textContent=`${checked}/${sec.items.length}`;cnt.classList.toggle('done',checked===sec.items.length);updateProg(pid)}
function updateProg(pid){const panel=document.getElementById('p-'+pid);const all=panel.querySelectorAll('input[type="checkbox"]');const checked=panel.querySelectorAll('input:checked');const pct=all.length?Math.round(checked.length/all.length*100):0;document.getElementById('pf-'+pid).style.width=pct+'%';document.getElementById('pp-'+pid).textContent=pct+'%';const msg=document.getElementById('pm-'+pid);if(pct===0)msg.textContent='Vamos allá...';else if(pct<50)msg.textContent='Empezando 💪';else if(pct<100)msg.textContent='¡Ya queda nada! 🔥';else{msg.textContent='¡COMPLETADO! 🎉🥳';celebrate()}}
function resetCurrent(){const panel=document.getElementById('p-'+curId);panel.querySelectorAll('input').forEach(i=>i.checked=false);const proc=P.find(p=>p.id===curId);proc.secs.forEach((_,si)=>{const cnt=document.getElementById(`cc-${curId}-${si}`);cnt.textContent=`0/${proc.secs[si].items.length}`;cnt.classList.remove('done')});updateProg(curId)}
function celebrate(){const el=document.createElement('div');el.className='cele';const colors=['#FFB5C5','#7ECDB5','#C4A8F0','#FFD966','#8ECBE8','#FF9E9E'];for(let i=0;i<50;i++){const c=document.createElement('div');c.className='confetti';c.style.cssText=`left:${Math.random()*100}%;top:${-10-Math.random()*20}px;width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;background:${colors[i%colors.length]};animation-delay:${Math.random()*.8}s`;el.appendChild(c)}document.body.appendChild(el);const m=document.createElement('div');m.className='complete-msg';m.innerHTML=`<div class="big">🎉🥳</div><div class="txt">¡Todo preparado!</div><div class="sub2">Eres una crack, compi 💪</div>`;document.body.appendChild(m);setTimeout(()=>{el.remove();m.remove()},3800)}
window.addEventListener('DOMContentLoaded',()=>{document.querySelectorAll('.cat').forEach(card=>{const n=card.querySelectorAll('input[type="checkbox"]').length;card.querySelector('.cat-cnt').textContent='0/'+n});document.querySelectorAll('.cat-body').forEach(b=>b.style.maxHeight=b.scrollHeight+'px')});
