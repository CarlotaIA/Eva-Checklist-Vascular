<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist Vascular - HM Sanchinarro</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Quicksand:wght@400;500;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
:root{--rosa:#FFB5C2;--rosa-l:#FFF0F3;--rosa-m:#FFD6DE;--rosa-d:#E8899A;--rosa-dd:#D4627E;--menta:#8DD9C4;--menta-l:#E8F8F2;--menta-m:#B8ECDC;--menta-d:#5AB894;--menta-dd:#3A9E7E;--coral:#FF8A8A;--coral-l:#FFE0E0;--coral-d:#E05A5A;--lav:#C4A8F0;--lav-l:#F0E8FF;--lav-d:#9064D6;--sky:#8ED0E8;--sky-l:#E4F4FB;--sky-d:#4AADC7;--peach:#FFB88C;--peach-l:#FFF0E4;--peach-d:#E08A52;--yellow:#FFD966;--yellow-l:#FFF8E0;--yellow-d:#D4A828;--teal:#6BC4B8;--teal-l:#E2F5F2;--teal-d:#3A9E90;--bg:#FFFAF8;--card:#FFFFFF;--text:#3A3A4A;--text-l:#8A8A9E;--text-ll:#C0C0D0;--shadow:0 3px 16px rgba(180,120,140,0.1);--shadow-h:0 6px 28px rgba(180,120,140,0.16);--radius:22px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Quicksand',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-weight:500}
.doodle-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.doodle-bg svg{position:absolute;opacity:.07}
.doodle-bg .d1{top:3%;left:2%;animation:df 12s ease-in-out infinite}
.doodle-bg .d2{top:8%;right:4%;animation:df 10s ease-in-out infinite 1s}
.doodle-bg .d3{top:25%;left:1%;animation:df 14s ease-in-out infinite 2s}
.doodle-bg .d4{top:40%;right:2%;animation:df 11s ease-in-out infinite .5s}
.doodle-bg .d5{top:55%;left:3%;animation:df 13s ease-in-out infinite 3s}
.doodle-bg .d6{top:70%;right:3%;animation:df 9s ease-in-out infinite 1.5s}
.doodle-bg .d7{top:85%;left:2%;animation:df 15s ease-in-out infinite 2.5s}
.doodle-bg .d8{top:15%;left:50%;animation:df 12s ease-in-out infinite 4s}
.doodle-bg .d9{top:92%;right:8%;animation:df 10s ease-in-out infinite 3.5s}
@keyframes df{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(8deg)}}
.page{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:16px 14px 60px}
.hero{text-align:center;padding:20px 16px 8px}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--menta-l),var(--rosa-l));border:2.5px dashed var(--menta);border-radius:30px;padding:6px 20px;font-family:'Quicksand';font-size:.7rem;font-weight:700;color:var(--menta-dd);text-transform:uppercase;letter-spacing:2.5px;margin-bottom:8px}
.hero-title-wrap{position:relative;display:inline-block;padding:0 50px}
.hero h1{font-family:'Baloo 2',cursive;font-size:2.7rem;font-weight:800;background:linear-gradient(135deg,var(--rosa-dd),var(--lav-d),var(--menta-dd));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15}
.title-deco-l,.title-deco-r{position:absolute;top:50%;transform:translateY(-50%)}
.title-deco-l{left:0}.title-deco-r{right:0}
.hero .sub{font-family:'Patrick Hand',cursive;font-size:1.2rem;color:var(--text-l);margin:2px 0 6px}
.eva-frame{position:relative;display:inline-block;margin:8px 0}
.eva-frame img{width:180px;height:auto;border-radius:50%;border:4px solid var(--rosa-m);box-shadow:0 4px 20px rgba(255,181,194,0.2);background:var(--rosa-l)}
.eva-deco{position:absolute;pointer-events:none}
.eva-deco.ed1{top:-8px;right:-15px;animation:sp 6s linear infinite}
.eva-deco.ed2{bottom:10px;left:-20px;animation:df 4s ease-in-out infinite}
.eva-deco.ed3{top:20px;left:-18px;animation:df 5s ease-in-out infinite 1s}
.eva-deco.ed4{bottom:-5px;right:-10px;animation:df 3s ease-in-out infinite .5s}
.eva-deco.ed5{top:-12px;left:30%;animation:sp 8s linear infinite reverse}
@keyframes sp{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.rainbow-line{width:220px;height:5px;border-radius:5px;margin:10px auto;background:linear-gradient(90deg,var(--rosa),var(--yellow),var(--menta),var(--sky),var(--lav),var(--rosa))}
.tip-bubble{display:inline-flex;align-items:center;gap:8px;background:var(--yellow-l);border:2.5px solid var(--yellow);border-radius:18px;padding:10px 20px;font-family:'Patrick Hand',cursive;font-size:1rem;color:var(--text);margin-top:6px;animation:wig 3s ease-in-out infinite;box-shadow:0 2px 8px rgba(212,168,40,0.08)}
@keyframes wig{0%,100%{transform:rotate(-0.5deg)}50%{transform:rotate(0.5deg)}}
.tabs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0 20px;padding:0 4px}
.tab{font-family:'Baloo 2',cursive;font-weight:700;font-size:.76rem;padding:8px 16px;border-radius:30px;border:2.5px solid transparent;cursor:pointer;transition:all .25s;text-transform:uppercase;letter-spacing:.3px;background:var(--card);color:var(--text);box-shadow:var(--shadow);position:relative;overflow:hidden}
.tab::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.45),transparent);transition:left .5s}
.tab:hover::after{left:100%}
.tab:hover{transform:translateY(-3px) scale(1.04);box-shadow:var(--shadow-h)}
.tab.on{color:#fff;transform:translateY(-3px);box-shadow:var(--shadow-h);border-color:transparent}
.tab[data-c="rosa"].on{background:var(--rosa-dd)}.tab[data-c="lav"].on{background:var(--lav-d)}.tab[data-c="sky"].on{background:var(--sky-d)}.tab[data-c="menta"].on{background:var(--menta-dd)}.tab[data-c="peach"].on{background:var(--peach-d)}.tab[data-c="coral"].on{background:var(--coral-d)}.tab[data-c="yellow"].on{background:var(--yellow-d)}.tab[data-c="teal"].on{background:var(--teal-d)}
.panel{display:none;animation:su .35s ease}.panel.show{display:block}
@keyframes su{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.panel-head{border-radius:var(--radius) var(--radius) 0 0;padding:20px 24px;color:#fff;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden}
.panel-head::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.13) 2px,transparent 2px);background-size:16px 16px;z-index:0}
.panel-head::after{content:'';position:absolute;top:-40%;right:-15%;width:200px;height:200px;background:rgba(255,255,255,0.06);border-radius:50%}
.panel-head .ico{font-size:2.2rem;z-index:1;animation:bn 2s ease-in-out infinite}
@keyframes bn{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.panel-head h2{font-family:'Baloo 2',cursive;font-size:1.6rem;font-weight:800;z-index:1;flex:1}
.panel-head .hd{z-index:1;opacity:.5}
.prog-wrap{background:var(--card);border-radius:0 0 var(--radius) var(--radius);padding:14px 22px;margin-bottom:14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.prog-bar{flex:1;height:16px;background:#f5f0f2;border-radius:16px;overflow:hidden;min-width:100px}
.prog-fill{height:100%;border-radius:16px;transition:width .4s ease;width:0%;position:relative}
.prog-fill::after{content:'';position:absolute;top:3px;left:5px;right:5px;height:5px;background:rgba(255,255,255,0.35);border-radius:5px}
.prog-pct{font-family:'Baloo 2',cursive;font-weight:800;font-size:1.1rem;min-width:44px;text-align:right}
.prog-label{font-family:'Patrick Hand',cursive;font-size:.95rem;color:var(--text-l)}
.prog-msg{font-family:'Patrick Hand',cursive;font-size:.85rem;color:var(--text-l);min-width:80px}
.cat{background:var(--card);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .3s,transform .2s;position:relative}
.cat:hover{box-shadow:var(--shadow-h);transform:translateY(-1px)}
.cat::before{content:'';position:absolute;top:-1px;right:-1px;width:32px;height:32px;border-radius:0 var(--radius) 0 16px;opacity:.15;z-index:2;pointer-events:none}
.cat:nth-child(4n+1)::before{background:var(--rosa)}.cat:nth-child(4n+2)::before{background:var(--menta)}.cat:nth-child(4n+3)::before{background:var(--lav)}.cat:nth-child(4n+4)::before{background:var(--sky)}
.cat-head{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;user-select:none;transition:background .2s;border-left:5px solid transparent}
.cat-head:hover{background:rgba(255,181,194,0.04)}
.cat-ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.cat-name{font-family:'Baloo 2',cursive;font-weight:700;font-size:.9rem;text-transform:uppercase;letter-spacing:.8px;flex:1}
.cat-cnt{font-family:'Baloo 2',cursive;font-size:.95rem;font-weight:700;padding:2px 12px;border-radius:20px;background:var(--rosa-l);color:var(--rosa-dd);transition:all .3s}
.cat-cnt.done{background:var(--menta-l);color:var(--menta-dd)}
.cat-arrow{font-size:.65rem;color:var(--text-ll);transition:transform .3s}
.cat-head.shut .cat-arrow{transform:rotate(-90deg)}
.cat-body{padding:2px 18px 14px;transition:max-height .35s ease,opacity .25s ease}
.cat-body.shut{max-height:0!important;padding-top:0;padding-bottom:0;opacity:0;overflow:hidden}
.ci{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1.5px dashed #f5eef0;transition:all .25s}
.ci:last-child{border-bottom:none}
.ci input{display:none}
.ci .bx{width:28px;height:28px;border-radius:9px;border:2.5px solid #e0d6da;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s}
.ci input:checked+.bx{border-color:var(--menta-dd);background:var(--menta);animation:pop .35s ease}
.ci input:checked+.bx::after{content:'\2713';color:#fff;font-size:.9rem;font-weight:900}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.3) rotate(10deg)}100%{transform:scale(1)}}
.ci input:checked~.lb{text-decoration:line-through;color:var(--text-ll);opacity:.5}
.ci .lb{font-size:.88rem;cursor:pointer;flex:1;line-height:1.35;font-weight:500}
.cond{margin:6px 0 4px;padding:10px 14px;border-radius:14px;font-family:'Patrick Hand',cursive;font-size:.92rem;display:flex;align-items:flex-start;gap:8px;background:var(--yellow-l);border:2px dashed var(--yellow)}
.actions{display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.abtn{font-family:'Baloo 2',cursive;font-weight:700;font-size:.78rem;padding:10px 22px;border-radius:30px;border:none;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.3px}
.abtn:hover{transform:translateY(-3px);box-shadow:var(--shadow-h)}
.a-reset{background:var(--coral-l);color:var(--coral-d)}.a-reset:hover{background:var(--coral);color:#fff}
.a-fold{background:var(--lav-l);color:var(--lav-d)}.a-fold:hover{background:var(--lav);color:#fff}
.a-print{background:var(--menta-l);color:var(--menta-dd)}.a-print:hover{background:var(--menta);color:#fff}
.foot{text-align:center;padding:28px 16px 10px;font-family:'Patrick Hand',cursive;font-size:.95rem;color:var(--text-l)}.foot .h{color:var(--rosa-d)}
.cele{position:fixed;inset:0;pointer-events:none;z-index:999}
.confetti{position:absolute;border-radius:3px;animation:cf 2.8s ease-in forwards}
@keyframes cf{0%{transform:translateY(-30px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(900deg);opacity:0}}
.complete-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:var(--card);border-radius:28px;padding:32px 44px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.15);z-index:1000;animation:pi .5s .3s ease forwards;pointer-events:none}
@keyframes pi{0%{transform:translate(-50%,-50%) scale(0)}60%{transform:translate(-50%,-50%) scale(1.1)}100%{transform:translate(-50%,-50%) scale(1)}}
.complete-msg .big{font-size:3.2rem;margin-bottom:8px}.complete-msg .txt{font-family:'Baloo 2',cursive;font-size:1.5rem;font-weight:800;color:var(--menta-dd)}.complete-msg .sub2{font-family:'Patrick Hand',cursive;font-size:1.05rem;color:var(--text-l);margin-top:4px}
@media print{body{background:#fff;font-size:10pt}.doodle-bg,.tabs,.actions,.foot,.tip-bubble,.rainbow-line,.eva-frame,.title-deco-l,.title-deco-r{display:none!important}.hero{padding:8px}.hero h1{font-size:1.8rem;-webkit-text-fill-color:var(--text)}.panel{display:block!important;page-break-after:always}.panel:last-of-type{page-break-after:avoid}.cat-body,.cat-body.shut{max-height:none!important;opacity:1!important}.cat-arrow,.cat::before,.panel-head::before,.panel-head .hd{display:none!important}.bx{border-color:#999!important}.page{max-width:100%;padding:0}.prog-wrap{display:none}.cat{box-shadow:none;border:1px solid #ddd}}
@media(max-width:600px){.hero h1{font-size:2rem}.eva-frame img{width:130px}.tabs{gap:5px}.tab{font-size:.64rem;padding:6px 10px}.panel-head h2{font-size:1.2rem}.title-deco-l,.title-deco-r{display:none}}
</style>
</head>

const catColors={'\u{1F527}':{bg:'var(--rosa-l)',fg:'var(--rosa-dd)',brd:'var(--rosa)'},'\u{1F4E6}':{bg:'var(--menta-l)',fg:'var(--menta-dd)',brd:'var(--menta)'},'\u{1F48A}':{bg:'var(--lav-l)',fg:'var(--lav-d)',brd:'var(--lav)'},'\u{1F9F5}':{bg:'var(--sky-l)',fg:'var(--sky-d)',brd:'var(--sky)'},'\u{1F440}':{bg:'var(--yellow-l)',fg:'var(--yellow-d)',brd:'var(--yellow)'}};
const msgs=['Vamos all\u00e1, compi...','Empezando \u{1F4AA}','En ello...','A medias \u26A1','\u00a1M\u00e1s de la mitad! \u{1F3AF}','Casi casi...','\u00a1Ya queda bah! \u{1F525}','\u00a1TODO LISTO! \u{1F389}\u{1F973}'];
function getMsg(p){if(p===0)return msgs[0];if(p===100)return msgs[7];if(p<15)return msgs[1];if(p<30)return msgs[2];if(p<50)return msgs[3];if(p<65)return msgs[4];if(p<85)return msgs[5];return msgs[6]}
const tabsEl=document.getElementById('tabs'),panelsEl=document.getElementById('panels');
DATA.forEach((s,si)=>{const btn=document.createElement('button');btn.className='tab'+(si===0?' on':'');btn.dataset.c=s.color;btn.innerHTML=s.ico+' '+s.name;btn.onclick=()=>showPanel(s.id,btn);tabsEl.appendChild(btn);let h='<div class="panel'+(si===0?' show':'')+'" id="p-'+s.id+'"><div class="panel-head" style="background:'+s.grad+'"><span class="ico">'+s.ico+'</span><h2>'+s.name+'</h2><span class="hd">'+s.deco+'</span></div><div class="prog-wrap" data-s="'+s.id+'"><span class="prog-label">Preparaci\u00f3n:</span><div class="prog-bar"><div class="prog-fill" style="background:var(--'+s.color+')"></div></div><span class="prog-pct" style="color:var(--'+s.color+'-d)">0%</span><span class="prog-msg">'+msgs[0]+'</span></div>';s.cats.forEach(c=>{const cc=catColors[c.ico]||catColors['\u{1F527}'];h+='<div class="cat"><div class="cat-head" onclick="toggle(this)" style="border-left-color:'+cc.brd+'"><div class="cat-ico" style="background:'+cc.bg+';color:'+cc.fg+'">'+c.ico+'</div><span class="cat-name">'+c.name+'</span><span class="cat-cnt">0/'+c.items.length+'</span><span class="cat-arrow">\u25BC</span></div><div class="cat-body" data-s="'+s.id+'">';if(c.note)h+='<div class="cond"><span>\u26A1</span><span>'+c.note+'</span></div>';c.items.forEach(it=>{h+='<label class="ci"><input type="checkbox" onchange="upd(\''+s.id+'\')"><span class="bx"></span><span class="lb">'+it+'</span></label>'});h+='</div></div>'});h+='</div>';panelsEl.innerHTML+=h});
function showPanel(id,btn){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'));document.getElementById('p-'+id).classList.add('show');document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on')}
function toggle(h){const b=h.nextElementSibling;h.classList.toggle('shut');if(b.classList.contains('shut')){b.classList.remove('shut');b.style.maxHeight=b.scrollHeight+'px'}else{b.style.maxHeight=b.scrollHeight+'px';requestAnimationFrame(()=>b.classList.add('shut'))}}
function upd(sid){const boxes=document.querySelectorAll('.cat-body[data-s="'+sid+'"] input[type="checkbox"]');const t=boxes.length,ck=[...boxes].filter(x=>x.checked).length,pct=Math.round(ck/t*100);const wrap=document.querySelector('.prog-wrap[data-s="'+sid+'"]');wrap.querySelector('.prog-fill').style.width=pct+'%';wrap.querySelector('.prog-pct').textContent=pct+'%';wrap.querySelector('.prog-msg').textContent=getMsg(pct);document.getElementById('p-'+sid).querySelectorAll('.cat').forEach(card=>{const ci=card.querySelectorAll('input[type="checkbox"]'),cc=[...ci].filter(x=>x.checked).length,cnt=card.querySelector('.cat-cnt');cnt.textContent=cc+'/'+ci.length;cnt.classList.toggle('done',cc===ci.length&&ci.length>0)});if(pct===100)celebrate(sid)}
function resetAll(){document.querySelectorAll('input[type="checkbox"]').forEach(cb=>cb.checked=false);document.querySelectorAll('.prog-fill').forEach(b=>b.style.width='0%');document.querySelectorAll('.prog-pct').forEach(t=>t.textContent='0%');document.querySelectorAll('.prog-msg').forEach(t=>t.textContent=msgs[0]);document.querySelectorAll('.cat-cnt').forEach(c=>{const card=c.closest('.cat'),n=card.querySelectorAll('input[type="checkbox"]').length;c.textContent='0/'+n;c.classList.remove('done')})}
let folded=false;
function foldAll(){folded=!folded;document.querySelectorAll('.cat').forEach(card=>{const h=card.querySelector('.cat-head'),b=card.querySelector('.cat-body');if(folded){h.classList.add('shut');b.classList.add('shut')}else{h.classList.remove('shut');b.classList.remove('shut');b.style.maxHeight=b.scrollHeight+'px'}})}
function celebrate(sid){const el=document.createElement('div');el.className='cele';document.body.appendChild(el);const cols=['#FFB5C2','#8DD9C4','#C4A8F0','#8ED0E8','#FFB88C','#FFD966','#FF8A8A'];for(let i=0;i<80;i++){const c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'%';c.style.background=cols[Math.floor(Math.random()*cols.length)];c.style.animationDelay=Math.random()*1.5+'s';c.style.width=(5+Math.random()*10)+'px';c.style.height=(5+Math.random()*10)+'px';el.appendChild(c)}const m=document.createElement('div');m.className='complete-msg';const s=DATA.find(x=>x.id===sid);m.innerHTML='<div class="big">\u{1F389}</div><div class="txt">\u00a1'+s.name+' listo!</div><div class="sub2">Todo preparado, \u00a1a por ello compi! \u{1F4AA}</div>';document.body.appendChild(m);setTimeout(()=>{el.remove();m.remove()},3800)}
window.addEventListener('DOMContentLoaded',()=>{document.querySelectorAll('.cat').forEach(card=>{const n=card.querySelectorAll('input[type="checkbox"]').length;card.querySelector('.cat-cnt').textContent='0/'+n});document.querySelectorAll('.cat-body').forEach(b=>b.style.maxHeight=b.scrollHeight+'px')});
</script>
